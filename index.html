<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="assets/css/main.css">
</head>

<body>

    <div class="animated-image-main">
        <div class="animated-image-inner">
            <div class="first-slide-animation">
                <div class="first-slide-inner">
                    <div class="first-slide-image-wrapper first-slide">
                        <img src="assets/image/slide-1.webp" class="" alt="slide-1">
                    </div>

                    <div class="first-slide-image-wrapper second-slide">
                        <img src="assets/image/slide-2.webp" class="" alt="slide-2">
                    </div>

                    <div class="first-slide-image-wrapper third-slide">
                        <img src="assets/image/slide-3.webp" class="" alt="slide-3">
                    </div>

                    <div class="first-slide-image-wrapper fourth-slide">
                        <img src="assets/image/slide-4.webp" class="" alt="slide-4">
                    </div>

                    <div class="first-slide-image-wrapper fifth-slide">
                        <img src="assets/image/slide-5.webp" class="" alt="slide-5">
                    </div>

                    <div class="first-slide-image-wrapper sixth-slide">
                        <img src="assets/image/slide-6.webp" class="" alt="slide-6">
                    </div>

                </div>
            </div>

            <div class="second-slide-animation">
                <div class="second-slide-inner">
                    <div class="second-slide-image-wrapper">
                        <img src="assets/image/night-full-img.webp" alt="night-full-img">
                    </div>
                </div>
            </div>

            <div class="third-slide-animation">
                <div class="third-slide-inner">
                    <div class="third-slide-image-wrapper">
                        <img src="assets/image/third-slide-img.webp" alt="third-slide-img">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
</body>

</html>
